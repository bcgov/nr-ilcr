apiVersion: template.openshift.io/v1
kind: Template
parameters:
  - name: NAME
    description: Module name
    required: true
  - name: COMPONENT
    description: Component name
    value: backend
  - name: ZONE
    description: Deployment zone, e.g. pr-### or prod
    required: true
  - name: IMAGE_TAG
    description: Image tag to use
    required: true
  - name: REGISTRY
    description: Container registry to import from
    value: ghcr.io
  - name: ORG_NAME
    description: Organization name
    value: bcgov
  - name: DOMAIN
    description: OpenShift apps domain. Override when Gold is provisioned.
    value: apps.gold.devops.gov.bc.ca
  - name: MIN_REPLICAS
    description: The minimum amount of replicas for the horizontal pod autoscaler.
    value: "1"
  - name: MAX_REPLICAS
    description: The maximum amount of replicas for the horizontal pod autoscaler.
    value: "1"
  - name: CPU_REQUEST
    value: "30m"
  - name: MEMORY_REQUEST
    value: "256Mi"
  - name: LOG_LEVEL
    description: Application log level (debug|info|warn|error)
    value: "info"
  - name: ORACLEDB_HOST
    description: Oracle database host; the init container fetches its TCPS cert
    required: true
  - name: ORACLEDB_PORT
    description: Oracle database TCPS port
    value: "1543"
  - name: ORACLEDB_SERVICENAME
    description: Oracle database service name
    required: true
  - name: COGNITO_REGION
    description: AWS region of the Cognito (FAM) user pool
    value: ca-central-1
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}
    spec:
      selector:
        matchLabels:
          deployment: ${NAME}-${ZONE}-${COMPONENT}
      strategy:
        type: RollingUpdate
      template:
        metadata:
          labels:
            app: ${NAME}-${ZONE}
            deployment: ${NAME}-${ZONE}-${COMPONENT}
        spec:
          terminationGracePeriodSeconds: 30
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        deployment: ${NAME}-${ZONE}-${COMPONENT}
                    topologyKey: kubernetes.io/hostname
          # Fetches the Oracle TCPS cert into a keystore on the api-cert PVC
          # before the app starts. Connecting out to the Oracle host is also
          # what triggers the namespace firewall rule for database egress.
          initContainers:
            - name: ${NAME}-init
              image: ghcr.io/bcgov/nr-forest-client/common:prod
              imagePullPolicy: Always
              env:
                - name: ORACLEDB_HOST
                  value: ${ORACLEDB_HOST}
                - name: ORACLEDB_PORT
                  value: ${ORACLEDB_PORT}
                - name: ORACLEDB_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ${NAME}-${ZONE}-${COMPONENT}
                      key: ORACLEDB_KEYSTORE_SECRET
              volumeMounts:
                - name: api-cert
                  mountPath: /cert
                - name: init-tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: "10m"
                  memory: "64Mi"
                  ephemeral-storage: "50Mi"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
          containers:
            - name: ${NAME}
              image: ${REGISTRY}/${ORG_NAME}/${NAME}/${COMPONENT}:${IMAGE_TAG}
              imagePullPolicy: Always
              ports:
                - name: http
                  containerPort: 8080
              env:
                - name: LOG_LEVEL
                  value: ${LOG_LEVEL}
                - name: SERVER_PORT
                  value: "8080"
                - name: SPRING_PROFILES_ACTIVE
                  value: openshift,oracle
                - name: APP_VERSION
                  value: ${IMAGE_TAG}
                - name: ILCR_SECURITY_ENABLED
                  value: "true"
                - name: ILCR_DATASOURCE_ENABLED
                  value: "true"
                - name: ORACLEDB_HOST
                  value: ${ORACLEDB_HOST}
                - name: ORACLEDB_PORT
                  value: ${ORACLEDB_PORT}
                - name: ORACLEDB_SERVICENAME
                  value: ${ORACLEDB_SERVICENAME}
                - name: ORACLEDB_KEYSTORE
                  value: /cert/jssecacerts
                - name: COGNITO_REGION
                  value: ${COGNITO_REGION}
                - name: COGNITO_USER_POOL
                  valueFrom:
                    secretKeyRef:
                      name: ${NAME}-${ZONE}-${COMPONENT}
                      key: COGNITO_USER_POOL
                - name: ORACLEDB_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: ${NAME}-${ZONE}-${COMPONENT}
                      key: ORACLEDB_KEYSTORE_SECRET
                - name: SPRING_DATASOURCE_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: ${NAME}-${ZONE}-${COMPONENT}
                      key: SPRING_DATASOURCE_USERNAME
                - name: SPRING_DATASOURCE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${NAME}-${ZONE}-${COMPONENT}
                      key: SPRING_DATASOURCE_PASSWORD
              resources:
                requests:
                  cpu: ${CPU_REQUEST}
                  memory: ${MEMORY_REQUEST}
                  ephemeral-storage: "200Mi"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
                - name: api-cert
                  mountPath: /cert
              startupProbe:
                httpGet:
                  path: /api/health/readiness
                  port: http
                periodSeconds: 5
                failureThreshold: 30
              readinessProbe:
                httpGet:
                  path: /api/health/readiness
                  port: http
                periodSeconds: 5
                failureThreshold: 3
              livenessProbe:
                httpGet:
                  path: /api/health/liveness
                  port: http
                periodSeconds: 10
                failureThreshold: 3
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 256Mi
            # Oracle keystore written by the init container, read by the app
            - name: api-cert
              persistentVolumeClaim:
                claimName: ${NAME}-${ZONE}-${COMPONENT}-api-cert
            - name: init-tmp
              emptyDir: {}
  - apiVersion: v1
    kind: Service
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}
    spec:
      ports:
        - name: http
          port: 80
          targetPort: 8080
      selector:
        deployment: ${NAME}-${ZONE}-${COMPONENT}
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: ${NAME}-${ZONE}-${COMPONENT}
      minReplicas: ${MIN_REPLICAS}
      maxReplicas: ${MAX_REPLICAS}
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 80
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
          selectPolicy: Max
  # PVC for the Oracle keystore (per-ZONE so PR previews are isolated)
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}-api-cert
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 50Mi
      storageClassName: netapp-file-standard
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}
    spec:
      maxUnavailable: 1
      selector:
        matchLabels:
          deployment: ${NAME}-${ZONE}-${COMPONENT}
