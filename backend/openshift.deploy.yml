apiVersion: template.openshift.io/v1
kind: Template
parameters:
  - name: NAME
    description: Module name
    required: true
  - name: COMPONENT
    description: Component name
    value: backend
  - name: ZONE
    description: Deployment zone, e.g. pr-### or prod
    required: true
  - name: IMAGE_TAG
    description: Image tag to use
    required: true
  - name: REGISTRY
    description: Container registry to import from
    value: ghcr.io
  - name: ORG_NAME
    description: Organization name
    value: bcgov
  - name: DOMAIN
    description: OpenShift apps domain. Override when Gold is provisioned.
    value: apps.gold.devops.gov.bc.ca
  - name: MIN_REPLICAS
    description: The minimum amount of replicas for the horizontal pod autoscaler.
    value: "1"
  - name: MAX_REPLICAS
    description: The maximum amount of replicas for the horizontal pod autoscaler.
    value: "1"
  - name: CPU_REQUEST
    value: "100m"
  - name: MEMORY_REQUEST
    value: "512Mi"
  - name: MEMORY_LIMIT
    description: Memory limit for the container (bounds the pod's working set).
    value: "1Gi"
  - name: LOG_LEVEL
    description: Application log level (debug|info|warn|error)
    value: "info"
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}
    spec:
      selector:
        matchLabels:
          deployment: ${NAME}-${ZONE}-${COMPONENT}
      strategy:
        type: RollingUpdate
      template:
        metadata:
          labels:
            app: ${NAME}-${ZONE}
            deployment: ${NAME}-${ZONE}-${COMPONENT}
        spec:
          terminationGracePeriodSeconds: 30
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        deployment: ${NAME}-${ZONE}-${COMPONENT}
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: ${NAME}
              image: ${REGISTRY}/${ORG_NAME}/${NAME}/${COMPONENT}:${IMAGE_TAG}
              imagePullPolicy: Always
              ports:
                - name: http
                  containerPort: 8080
              env:
                - name: LOG_LEVEL
                  value: ${LOG_LEVEL}
                - name: SERVER_PORT
                  value: "8080"
                - name: SPRING_PROFILES_ACTIVE
                  value: openshift
                - name: APP_VERSION
                  value: ${IMAGE_TAG}
              resources:
                requests:
                  cpu: ${CPU_REQUEST}
                  memory: ${MEMORY_REQUEST}
                limits:
                  memory: ${MEMORY_LIMIT}
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              startupProbe:
                httpGet:
                  path: /api/health/readiness
                  port: http
                periodSeconds: 5
                failureThreshold: 30
              readinessProbe:
                httpGet:
                  path: /api/health/readiness
                  port: http
                periodSeconds: 5
                failureThreshold: 3
              livenessProbe:
                httpGet:
                  path: /api/health/liveness
                  port: http
                periodSeconds: 10
                failureThreshold: 3
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 256Mi
  - apiVersion: v1
    kind: Service
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}
    spec:
      ports:
        - name: http
          port: 80
          targetPort: 8080
      selector:
        deployment: ${NAME}-${ZONE}-${COMPONENT}
  - apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: ${NAME}-${ZONE}-${COMPONENT}
      minReplicas: ${MIN_REPLICAS}
      maxReplicas: ${MAX_REPLICAS}
      metrics:
        - type: Resource
          resource:
            name: cpu
            target:
              type: Utilization
              averageUtilization: 80
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
          selectPolicy: Max
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      labels:
        app: ${NAME}-${ZONE}
      name: ${NAME}-${ZONE}-${COMPONENT}
    spec:
      maxUnavailable: 1
      selector:
        matchLabels:
          deployment: ${NAME}-${ZONE}-${COMPONENT}
