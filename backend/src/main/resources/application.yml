spring:
  application:
    name: nr-ilcr-backend
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: ${SPRING_DATASOURCE_POOL_NAME:ILCROraclePool}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:1}
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:60000}
      max-lifetime: ${SPRING_DATASOURCE_MAX_LIFETIME:180000}
      keepalive-time: ${SPRING_DATASOURCE_KEEPALIVE_TIME:60000}
      leak-detection-threshold: ${SPRING_DATASOURCE_LEAK_DETECTION_THRESHOLD:60000}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /api
      discovery:
        enabled: false
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: nr-ilcr-backend
    version: ${APP_VERSION:0.0.1-SNAPSHOT}

ilcr:
  version: ${APP_VERSION:0.0.1-SNAPSHOT}
  security:
    enabled: ${ILCR_SECURITY_ENABLED:false}
  datasource:
    enabled: ${ILCR_DATASOURCE_ENABLED:false}
    validation-query: ${ILCR_DATASOURCE_VALIDATION_QUERY:SELECT 1 FROM DUAL}

features:
  flags:
    offline-mode-enabled: ${FEATURE_OFFLINE_MODE_ENABLED:false}

logging:
  level:
    root: ${LOG_LEVEL:INFO}

---
spring:
  config:
    activate:
      on-profile: oracle
  data:
    jdbc:
      repositories:
        enabled: true
  # TCPS URL composed from parts; trust material is scoped to the JDBC
  # connection via URL properties (waste-plus pattern) so the JVM default
  # truststore stays intact for public HTTPS calls (e.g. OIDC JWKS).
  datasource:
    url: jdbc:oracle:thin:@tcps://${ORACLEDB_HOST:localhost}:${ORACLEDB_PORT:1543}/${ORACLEDB_SERVICENAME:ilcr}?javax.net.ssl.trustStore=${ORACLEDB_KEYSTORE:/cert/jssecacerts}&javax.net.ssl.trustStorePassword=${ORACLEDB_SECRET:changeit}&javax.net.ssl.keyStore=${ORACLEDB_KEYSTORE:/cert/jssecacerts}&javax.net.ssl.keyStorePassword=${ORACLEDB_SECRET:changeit}

ilcr:
  datasource:
    enabled: true
