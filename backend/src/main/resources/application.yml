spring:
  application:
    name: nr-ilcr-backend
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /api
      discovery:
        enabled: false
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: nr-ilcr-backend
    version: ${APP_VERSION:0.0.1-SNAPSHOT}

ilcr:
  version: ${APP_VERSION:0.0.1-SNAPSHOT}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
