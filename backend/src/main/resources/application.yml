spring:
  application:
    name: nr-ilcr-backend
  jackson:
    default-property-inclusion: non_null
  data:
    jdbc:
      repositories:
        enabled: ${ilcr.datasource.enabled:true}
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      pool-name: ${SPRING_DATASOURCE_POOL_NAME:ILCROraclePool}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:1}
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:60000}
      max-lifetime: ${SPRING_DATASOURCE_MAX_LIFETIME:180000}
      keepalive-time: ${SPRING_DATASOURCE_KEEPALIVE_TIME:60000}
      leak-detection-threshold: ${SPRING_DATASOURCE_LEAK_DETECTION_THRESHOLD:60000}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /api
      discovery:
        enabled: false
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: false

info:
  app:
    name: nr-ilcr-backend
    version: ${APP_VERSION:0.0.1-SNAPSHOT}

ilcr:
  version: ${APP_VERSION:0.0.1-SNAPSHOT}
  security:
    enabled: ${ILCR_SECURITY_ENABLED:true}
  datasource:
    enabled: ${ILCR_DATASOURCE_ENABLED:true}
    validation-query: ${ILCR_DATASOURCE_VALIDATION_QUERY:SELECT 1 FROM DUAL}

features:
  flags:
    offline-mode-enabled: ${FEATURE_OFFLINE_MODE_ENABLED:false}

logging:
  level:
    root: ${LOG_LEVEL:INFO}

---
spring:
  config:
    activate:
      on-profile: local

ilcr:
  security:
    enabled: ${ILCR_SECURITY_ENABLED:false}
  datasource:
    enabled: ${ILCR_DATASOURCE_ENABLED:false}

---
spring:
  config:
    activate:
      on-profile: oracle
  data:
    jdbc:
      repositories:
        enabled: true

ilcr:
  datasource:
    enabled: true
