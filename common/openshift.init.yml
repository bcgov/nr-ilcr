apiVersion: template.openshift.io/v1
kind: Template
parameters:
  - name: NAME
    description: Product name
    value: nr-ilcr
  - name: ZONE
    description: Deployment zone, e.g. pr-### or prod
    required: true
objects:
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: ${NAME}-${ZONE}-frontend-ingress
      labels:
        app: ${NAME}-${ZONE}
    spec:
      podSelector:
        matchLabels:
          deployment: ${NAME}-${ZONE}-frontend
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  network.openshift.io/policy-group: ingress
      policyTypes:
        - Ingress
  - apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: ${NAME}-${ZONE}-backend-ingress
      labels:
        app: ${NAME}-${ZONE}
    spec:
      podSelector:
        matchLabels:
          deployment: ${NAME}-${ZONE}-backend
      ingress:
        - from:
            - podSelector:
                matchLabels:
                  app: ${NAME}-${ZONE}
                  deployment: ${NAME}-${ZONE}-frontend
      policyTypes:
        - Ingress
