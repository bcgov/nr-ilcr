# Reusable vars
x-var:
  - &node-image node:22
  - &maven-image maven:3.9.11-eclipse-temurin-21

services:
  backend:
    container_name: backend
    entrypoint: sh -c "mvn -B -ntp spring-boot:run"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      LOG_LEVEL: INFO
      ILCR_SECURITY_ENABLED: ${ILCR_SECURITY_ENABLED:-false}
      ILCR_DATASOURCE_ENABLED: ${ILCR_DATASOURCE_ENABLED:-false}
      ILCR_DATASOURCE_VALIDATION_QUERY: ${ILCR_DATASOURCE_VALIDATION_QUERY:-SELECT 1 FROM DUAL}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
    image: *maven-image
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || wget -qO- http://localhost:8080/api/health"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: "/app"
    volumes: ["./backend:/app", "maven-cache:/root/.m2"]

  frontend:
    container_name: frontend
    entrypoint: sh -c "npm ci --ignore-scripts && npm run dev"
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 3000
      NODE_ENV: development
    image: *node-image
    ports: ["3000:3000"]
    volumes: ["./frontend:/app", "/app/node_modules"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
    working_dir: "/app"
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    container_name: caddy
    profiles: ["caddy"]
    build: ./frontend
    environment:
      NODE_ENV: development
      PORT: 3000
      BACKEND_URL: http://backend:8080
      LOG_LEVEL: info
    ports: ["3005:3000"]
    volumes: ["./frontend/Caddyfile:/etc/caddy/Caddyfile"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
    depends_on:
      backend:
        condition: service_healthy

volumes:
  maven-cache:
